    pickup:
      place: PICK_A
      handler: dispenser_a
      sku: item_a
    dropoff:
      place: DROP_C
      handler: ingestor_c
    priority: 0

  - type: delivery
    description: "PICK_B → DROP_A"
    pickup:
      place: PICK_B
      handler: dispenser_b
      sku: item_b
    dropoff:
      place: DROP_A
