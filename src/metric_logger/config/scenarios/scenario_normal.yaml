    pickup:
      place: PICK_B
      handler: dispenser_b
      sku: item_b
    dropoff:
      place: DROP_C
      handler: ingestor_c
    priority: 0

  - type: delivery
    description: "PICK_C → DROP_A"
    pickup:
      place: PICK_C
      handler: dispenser_c
      sku: item_c
    dropoff:
      place: DROP_A
