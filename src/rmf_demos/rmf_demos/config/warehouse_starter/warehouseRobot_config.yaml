rmf_fleet:
  name: "warehouseRobot"
  limits:
    linear: [0.5, 0.75]
    angular: [0.6, 2.0]
  profile:
    footprint: 0.6
    vicinity: 1.5
  reversible: False
  battery_system:
    voltage: 12.0
    capacity: 24.0
    charging_current: 5.0
  mechanical_system:
    mass: 20.0
    moment_of_inertia: 10.0
    friction_coefficient: 0.22
  ambient_system:
    power: 20.0
  tool_system:
    power: 0.0
  recharge_threshold: 0.10
  recharge_soc: 1.0
  publish_fleet_state: 10.0
  account_for_battery_drain: True
  task_capabilities:
    loop: True
    delivery: True
  finishing_request: "park"
  responsive_wait: True
  robots:
    warehouseRobot1:
      charger: "warehouseRobot1_charger"
      responsive_wait: False
    warehouseRobot2:
      charger: "warehouseRobot2_charger"
      responsive_wait: False
    warehouseRobot3:
      charger: "warehouseRobot3_charger"
      responsive_wait: False
    warehouseRobot4:
      charger: "warehouseRobot4_charger"
      responsive_wait: False

fleet_manager:
  ip: "127.0.0.1"
  port: 22011
  user: "some_user"
  password: "some_password"
